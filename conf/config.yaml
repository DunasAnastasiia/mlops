defaults:
  - model: random_forest
  - _self_
  - override hydra/sweeper: optuna

input_dir: data/processed
model_path: model.pkl
metrics_path: metrics.json

seed: 42

prepare:
  test_size: 0.3
  random_state: 42

hydra:
  run:
    dir: .
  output_subdir: null
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    direction: maximize
    storage: null
    study_name: weather_hpo
    n_trials: 20
    n_jobs: 1
    params:
      model.params.n_estimators: choice(50, 100, 200)
      model.params.max_depth: choice(5, 10, 20)
