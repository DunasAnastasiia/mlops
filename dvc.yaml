stages:
  prepare:
    cmd: python src/prepare.py --input data/raw/weatherAUS.csv --output-dir data/processed
    deps:
      - data/raw/weatherAUS.csv
      - src/prepare.py
    params:
      - prepare.test_size
      - prepare.random_state
    outs:
      - data/processed:
          cache: true

  train:
    cmd: python src/train.py --input-dir data/processed --model-path models/model.pkl --metrics-path metrics.json
    deps:
      - data/processed
      - src/train.py
    params:
      - train.model_type
      - train.n_estimators
      - train.max_depth
      - train.min_samples_split
    outs:
      - models/model.pkl:
          cache: true
    metrics:
      - metrics.json:
          cache: false
