name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flake8 black pylint
      - name: Run Linting
        run: |
          flake8 src/ dags/ tests/ --ignore=E501,W503
          black --check src/ dags/ tests/ --line-length 120
          pylint src/ dags/ tests/ --disable=C0114,C0115,C0116,R0903,C0301,import-error

  dag_integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Airflow and test deps
        run: |
          pip install "apache-airflow==2.7.1" "pendulum<3.0.0" pytest
      - name: Run DAG Integrity Test
        run: |
          pytest tests/test_dag_integrity.py

  docker_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ML Project Image
        run: |
          docker build -t ml-project:latest .
