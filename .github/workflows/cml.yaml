name: CML & Model Training
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  train-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: iterative/setup-cml@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Linting
        run: |
          flake8 src/ tests/ --ignore=E501,W503
          black --check src/ tests/ --line-length 120
      - name: Download Real Data
        run: |
          mkdir -p data/raw
          python -c "import pandas as pd; url='https://raw.githubusercontent.com/sk-taneja/ML-Project-Rain-in-Australia/master/data/weatherAUS.csv'; df=pd.read_csv(url); df.to_csv('data/raw/weatherAUS.csv', index=False); print('Success: Data downloaded via Python')"
          
      - name: Data Preparation
        run: |
          dvc repro prepare || python src/prepare.py
          
      - name: Pre-train tests (Data Validation)
        run: |
          pytest tests/test_data_validation.py
      - name: Train model
        run: |
          dvc repro train || python src/train.py model=random_forest
      - name: Post-train tests (Artifacts & Quality Gate)
        run: |
          pytest tests/test_artifacts.py
          pytest tests/test_quality_gate.py
      - name: Write CML report
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Model Metrics" > report.md
          echo "\`\`\`json" >> report.md
          cat metrics.json >> report.md
          echo "\`\`\`" >> report.md
          echo "## Confusion Matrix" >> report.md
          cml publish confusion_matrix.png --md >> report.md
          cml comment create report.md
      - name: Upload model artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: weather-model
          path: models/model.pkl
